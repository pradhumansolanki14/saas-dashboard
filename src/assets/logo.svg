<svg
  width="256"
  height="256"
  viewBox="0 0 256 256"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- BACKGROUND -->
  <rect
    width="256"
    height="256"
    rx="58"
    fill="url(#bg)"
  />

  <!-- TOP LEFT -->
  <g filter="url(#shadow)">
    <rect
      x="58"
      y="50"
      width="66"
      height="108"
      rx="22"
      fill="white"
    />

    <rect
      x="79"
      y="71"
      width="24"
      height="66"
      rx="7"
      fill="url(#inner)"
    />
  </g>

  <!-- TOP RIGHT -->
  <g filter="url(#shadow)">
    <rect
      x="134"
      y="50"
      width="66"
      height="52"
      rx="22"
      fill="white"
    />

    <rect
      x="155"
      y="69"
      width="24"
      height="14"
      rx="5"
      fill="url(#inner)"
    />
  </g>

  <!-- BOTTOM LEFT -->
  <g filter="url(#shadow)">
    <rect
      x="58"
      y="160"
      width="66"
      height="52"
      rx="22"
      fill="white"
    />

    <rect
      x="79"
      y="179"
      width="24"
      height="14"
      rx="5"
      fill="url(#inner)"
    />
  </g>

  <!-- BOTTOM RIGHT -->
  <g filter="url(#shadow)">
    <rect
      x="134"
      y="104"
      width="66"
      height="108"
      rx="22"
      fill="white"
    />

    <rect
      x="155"
      y="125"
      width="24"
      height="66"
      rx="7"
      fill="url(#inner)"
    />
  </g>

  <!-- GRADIENTS -->
  <defs>
    <!-- BACKGROUND -->
    <linearGradient
      id="bg"
      x1="0"
      y1="0"
      x2="256"
      y2="256"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#06B6D4" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>

    <!-- INNER CUTOUT -->
    <linearGradient
      id="inner"
      x1="58"
      y1="50"
      x2="200"
      y2="212"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#06B6D4" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>

    <!-- SHADOW -->
    <filter
      id="shadow"
      x="0"
      y="0"
      width="256"
      height="256"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="10"
        flood-color="#0F172A"
        flood-opacity="0.18"
      />
    </filter>
  </defs>
</svg>